<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Custom Wear | Personalizowane ubrania</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#050505;
color:white;
}


nav{
position:fixed;
top:0;
width:100%;
padding:25px 8%;
display:flex;
justify-content:space-between;
background:#000;
border-bottom:1px solid #222;
}


nav a{
color:white;
text-decoration:none;
margin-left:30px;
}


.hero{

height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;

}


.hero h1{

font-size:80px;
font-weight:900;

}


.hero p{

font-size:22px;
color:#aaa;
margin-top:20px;

}


button{

margin-top:40px;
padding:18px 45px;
border-radius:40px;
border:none;
font-weight:bold;
cursor:pointer;

}



.products{

padding:80px 8%;

}


.grid{

display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;

}


.card{

background:#111;
padding:20px;
border-radius:20px;

}


.card img{

width:100%;
height:350px;
object-fit:cover;
border-radius:15px;

}


@media(max-width:800px){

.grid{
grid-template-columns:1fr;
}


.hero h1{
font-size:45px;
}

}

</style>

</head>


<body>


<nav>

<h2>CUSTOM WEAR</h2>


<div>

<a href="#">Start</a>
<a href="#">Sklep</a>
<a href="#">Personalizacja</a>
<a href="#">Kontakt</a>

</div>

</nav>



<section class="hero">


<div>

<h1>
STWÓRZ
<br>
SWOJE UBRANIE
</h1>


<p>
Bluzy • Koszulki • Komplety premium
</p>


<button>
Zaprojektuj teraz
</button>


</div>


</section>




<section class="products">


<h1>
Najpopularniejsze
</h1>


<div class="grid">


<div class="card">

<img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7">

<h2>Bluza Oversize</h2>

<p>od 199 zł</p>

</div>



<div class="card">

<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab">

<h2>Koszulka Custom</h2>

</div>



<div class="card">

<img src="https://images.unsplash.com/photo-1551488831-00ddcb6c6bd3">

<p>od 299 zł</p>

</div>



</div>


</section>

</html>
