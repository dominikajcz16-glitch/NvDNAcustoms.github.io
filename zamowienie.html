<!DOCTYPE html>
<html lang="pl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Zamówienie | Custom Wear</title>


<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}


body{

background:#050505;
color:white;

}


nav{

padding:25px 8%;
background:#000;
border-bottom:1px solid #222;

display:flex;
justify-content:space-between;

}


a{

color:white;
text-decoration:none;

}



.container{

max-width:1000px;
margin:70px auto;
padding:20px;

}



h1{

font-size:50px;
margin-bottom:40px;

}



.box{

background:#111;
padding:35px;
border-radius:25px;
margin-bottom:30px;

}



label{

display:block;
margin-top:20px;
margin-bottom:8px;
color:#aaa;

}



input,select,textarea{

width:100%;
padding:15px;

background:#050505;

border:1px solid #333;

color:white;

border-radius:10px;

}



button{

margin-top:30px;

padding:18px 45px;

border:none;

border-radius:40px;

font-weight:bold;

cursor:pointer;

}



.summary{

background:#151515;

padding:20px;

border-radius:15px;

}



</style>


</head>


<body>


<nav>

<h2>CUSTOM WEAR</h2>

<a href="index.html">
Start
</a>

</nav>




<div class="container">


<h1>
Finalizacja zamówienia
</h1>



<div class="box">


<h2>
Dane klienta
</h2>


<label>
Imię i nazwisko
</label>

<input placeholder="Jan Kowalski">



<label>
Telefon
</label>

<input placeholder="+48 000 000 000">



<label>
E-mail
</label>

<input placeholder="email@example.com">



</div>




<div class="box">


<h2>
Adres dostawy
</h2>


<label>
Ulica i numer
</label>

<input>



<label>
Kod pocztowy
</label>

<input placeholder="00-000">



<label>
Miasto
</label>

<input>




</div>





<div class="box">


<h2>
Dostawa
</h2>


<label>
Wybierz sposób dostawy
</label>


<select>

<option>
Paczkomat InPost
</option>

<option>
Kurier
</option>

<option>
Odbiór osobisty
</option>

</select>



</div>





<div class="box">


<h2>
Płatność
</h2>


<select>

<option>
BLIK
</option>

<option>
Przelew online
</option>

<option>
Karta
</option>

</select>



</div>





<div class="box">


<h2>
Uwagi do zamówienia
</h2>


<textarea rows="5"
placeholder="Dodatkowe informacje...">
</textarea>



</div>






<div class="summary">


<h2>
Podsumowanie
</h2>


<p>
Produkt: Bluza personalizowana
</p>


<p>
Cena: 199 zł
</p>


<p>
Dostawa: Paczkomat InPost
</p>



<button onclick="sendOrder()">

Zamawiam i płacę

</button>


</div>



</div>




<script>


function sendOrder(){

alert(
"Zamówienie zostało przygotowane! Następnie podłączymy płatności."
);

}



</script>



</body>

</html>
